<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">NexaVPN Open Graph Image</title>
  <desc id="desc">Promotional artwork for NexaVPN featuring dark premium background and neon cyan and magenta highlights.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#FF2BD6"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="220" cy="160" r="130" fill="#00E5FF" opacity="0.18" filter="url(#blur)"/>
  <circle cx="950" cy="140" r="110" fill="#FF2BD6" opacity="0.18" filter="url(#blur)"/>
  <circle cx="920" cy="470" r="160" fill="#00E5FF" opacity="0.12" filter="url(#blur)"/>
  <rect x="90" y="90" width="1020" height="450" rx="36" fill="#FFFFFF" fill-opacity="0.02" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <text x="120" y="250" fill="#F5FBFF" font-family="Inter, Arial, sans-serif" font-size="88" font-weight="800">NexaVPN</text>
  <text x="120" y="330" fill="#C7D5E9" font-family="Inter, Arial, sans-serif" font-size="34">Fast. Private. Secure. Premium VPN for Android &amp; iPhone.</text>
  <rect x="120" y="380" width="280" height="74" rx="37" fill="url(#g)" opacity="0.2" stroke="#FFFFFF" stroke-opacity="0.16"/>
  <text x="170" y="427" fill="#F5FBFF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">One-tap protection</text>
  <g transform="translate(840 165)">
    <rect width="180" height="300" rx="34" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <rect x="16" y="18" width="148" height="264" rx="26" fill="#0B1020"/>
    <circle cx="90" cy="120" r="52" fill="none" stroke="#00E5FF" stroke-width="6" opacity="0.8"/>
    <circle cx="90" cy="120" r="36" fill="none" stroke="#FF2BD6" stroke-width="6" opacity="0.8"/>
    <text x="90" y="195" text-anchor="middle" fill="#F5FBFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Connected</text>
    <rect x="28" y="220" width="124" height="18" rx="9" fill="#FFFFFF" fill-opacity="0.12"/>
    <rect x="28" y="248" width="124" height="18" rx="9" fill="#FFFFFF" fill-opacity="0.08"/>
  </g>
</svg>
